litellm_settings:
  drop_params: true  # drop unsupported params (e.g. cache_control.scope) to avoid 400 errors
  cache: true
  cache_responses: true  # enable caching for streaming responses
  cache_params:
    type: "redis"
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
    ttl: 600  # cache for 10 minutes

model_list:
  # claude-sonnet-4-6 load balancing across multiple Bedrock credentials
  # simple-shuffle randomly picks a deployment on each request
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: bedrock/global.anthropic.claude-sonnet-4-6
      api_key: os.environ/BEDROCK_API_KEY_1
      aws_region_name: us-east-1
    model_info:
      id: claude-sonnet-4-6-bedrock-1

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: bedrock/global.anthropic.claude-sonnet-4-6
      api_key: os.environ/BEDROCK_API_KEY_2
      aws_region_name: us-east-1
    model_info:
      id: claude-sonnet-4-6-bedrock-2

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: bedrock/global.anthropic.claude-sonnet-4-6
      api_key: os.environ/BEDROCK_API_KEY_3
      aws_region_name: us-east-1
    model_info:
      id: claude-sonnet-4-6-bedrock-3

  # Add more keys by duplicating a block above and incrementing the env var index

router_settings:
  routing_strategy: simple-shuffle   # randomly pick a deployment on each request
  allowed_fails: 3                   # mark a deployment unhealthy after 3 consecutive failures
  cooldown_time: 60                  # seconds before retrying an unhealthy deployment
  num_retries: 2                     # retry on another deployment if one fails
  retry_after: 5                     # seconds between retries
  timeout: 60                        # per-request timeout in seconds

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL