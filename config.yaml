litellm_settings:
  cache: true
  cache_params:
    type: "redis"
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
    ttl: 600  # cache for 10 minutes

# No model_list defined here - configure models via Web UI
# UI allows adding models dynamically:
# - Bedrock models (uses ECS Task IAM Role for authentication)
# - OpenAI, Anthropic, Azure, etc. (provide API keys in UI)

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL